            type: string
        type: object
      description: |-
        This event reports that the consignment was transferred to customs.
        Conforms to CIMP FSU status 'TGC'.
      required:
      - airportOfTransfer
      - numberOfPieces
      - timeOfEvent
      - timeOfEventTimePartQuality
      type: object
    TransportInformation:
      properties:
        transportStageQualifier:
          type: string
        carrierCode:
          type: string
        carrierCodeSource:
          type: string
        carrierName:
          type: string
        conveyanceReference:
          type: string
        modeOfTransport:
          type: string
        departureLocationCode:
          type: string
        departureLocationCodeSource:
          type: string
        departureLocationName:
          type: string
        transportDepartureDateTime:
          format: date-time
          type: string
        arrivalLocationCode:
          type: string
        arrivalLocationCodeSource:
          type: string
        arrivalLocationName:
          type: string
        transportArrivalDateTime:
          format: date-time
          type: string
        transportLegRateCode:
          type: string
        transportLegContract:
          type: string
      required:
      - transportStageQualifier
      type: object
    TruckingEvent:
      description: List of trucking events related to the flight status.
      discriminator:
        propertyName: type
      properties:
        numberOfPieces:
          description: Number of pieces of the consignment this trucking event belongs
            to.
          example: 12
          type: integer
        weight:
          $ref: "#/components/schemas/Weight"
        uld:
          description: Unit Load Device (ULD) data.
          items:
            $ref: "#/components/schemas/ULD"
          type: array
        fullName:
          description: fullName
          type: string
        discrepancyType:
          description: discrepancyType
          type: string
        timeOfEvent:
          description: Date and time when this event was created or reported.
          format: date-time
          type: string
        licensePlate:
          description: The license plate of the truck moving the cargo.
          type: string
        wgs84Latitude:
          description: Current latitude of the truck.
          example: 48.7199
          format: double
          type: number
        wgs84Longitude:
          description: Current longitude of the truck.
          example: 2.3161
          format: double
          type: number
        imageData:
          description: Optional image.
          format: byte
          type: string
        type:
          type: string
      required:
      - numberOfPieces
      - timeOfEvent
      - type
      type: object
    TruckingStatus:
      description: A Flight Status indicates a status in the movement of the nominated
        consignment.
      properties:
        processType:
          description: "processType : firstmile or lastmile"
          enum:
          - firstmile
          - lastmile
          - firstmile_full
          - lastmile_full
          type: string
        airWaybillNumber:
          description: Contains the air waybill number.
          type: string
        originAndDestination:
          $ref: "#/components/schemas/OriginAndDestination"
        truckingReferenceNumber:
          description: Alternate reference for this shipment if no AWB number available.
          type: string
        quantity:
          $ref: "#/components/schemas/Quantity"
        totalNumberOfPieces:
          description: Total number of pieces of the consignment.
          example: 20
          type: integer
        events:
          description: Array of trucking events related to the trucking status. Will
            often be only one event.
          items:
            $ref: "#/components/schemas/TruckingEvent"
          type: array
        otherServiceInformation:
          description: "Other service information: Remarks relating to a shipment."
          example: Extra charge due to special handling requirements.
          type: string
        to:
          type: string
        from:
          type: string
        signature:
          type: string
      type: object
    TruckingStatusMessage:
      description: Cargo Canonical message containing a TruckingStatus as payload.
      properties:
        type:
          description: ""
          type: string
          example: null
        id:
          description: Unique identification of the message.
          format: uuid
          type: string
          example: null
        messageHeader:
          $ref: "#/components/schemas/MessageHeader"
        processType:
          description: "processType : firstmile or lastmile"
          enum:
          - firstmile
          - lastmile
          - firstmile_full
          - lastmile_full
          type: string
          example: null
        airWaybillNumber:
          description: Contains the air waybill number.
          type: string
          example: null
        originAndDestination:
          $ref: "#/components/schemas/OriginAndDestination"
        truckingReferenceNumber:
          description: Alternate reference for this shipment if no AWB number available.
          type: string
          example: null
        quantity:
          $ref: "#/components/schemas/Quantity"
        totalNumberOfPieces:
          description: Total number of pieces of the consignment.
          example: 20
          type: integer
        events:
          description: Array of trucking events related to the trucking status. Will
            often be only one event.
          items:
            $ref: "#/components/schemas/TruckingEvent"
          type: array
          example: null
        otherServiceInformation:
          description: "Other service information: Remarks relating to a shipment."
          example: Extra charge due to special handling requirements.
          type: string
        to:
          description: ""
          type: string
          example: null
        from:
          description: ""
          type: string
          example: null
        signature:
          description: ""
          type: string
          example: null
      required:
      - id
      - messageHeader
      - type
      type: object
    ULD:
      description: Unit Load Device (ULD).
      properties:
        type:
          description: |-
            Code identifying a standard Unit Load Device type.
            Must match regular expression '[A-Z][A-Z0-9]{2}'.
          example: ASE
          pattern: "[A-Z][A-Z0-9]{2}"
          type: string
        serialNumber:
          description: |-
            Serial number allocated to each Unit Load Device by its owner.
            Must match regular expression '[A-Z0-9][0-9]{3,4}'.
          example: "1234"
          pattern: "[A-Z0-9][0-9]{3,4}"
          type: string
        ownerCode:
          description: |-
            Code to identify the owner of a Unit Load Device.
            Must match regular expression '[A-Z0-9]{2}'.
          example: TW
          pattern: "[A-Z0-9]{2}"
          type: string
        loadingIndicator:
          description: "ULD Loading Indicator: Code indicating ULD height or loading\
            \ limitation."
          enum:
          - MAIN_DECK_LOADING_ONLY
          - NOSE_DOOR_LOADING_ONLY
          - ULD_HEIGHT_BELOW_160_CENTIMETRES
          - ULD_HEIGHT_BELOW_160_AND_244_CENTIMETRES
          - ULD_HEIGHT_ABOVE_244_CENTIMETRES
          type: string
        remarks:
          description: Information related to a specific Unit Load Device
          example: Do not load via nose door.
          type: string
        weightOfULDContents:
          $ref: "#/components/schemas/Weight"
      required:
      - ownerCode
      - serialNumber
      - type
      type: object
    ULDInformation:
      properties:
        uld:
          $ref: "#/components/schemas/ULD"
        onwardRoutingAndBooking:
          items:
            $ref: "#/components/schemas/RoutingAndBooking"
          type: array
        percentAvailableVolume:
          format: int32
          type: integer
      required:
      - uld
      type: object
    Volume:
      description: This structure holds the volume data of a shipment.
      properties:
        amount:
          description: Amount of volume units.
          example: 250
          type: number
        unit:
          description: Enumeration for volume units.
          enum:
          - CUBIC_CENTIMETRE
          - CUBIC_FOOT
          - CUBIC_INCH
          - CUBIC_METRE
          type: string
      required:
      - amount
      - unit
      type: object
    Weight:
      description: This structure holds the weight data of a shipment.
      properties:
        amount:
          description: Amount of weight units.
          example: 100
          type: number
        unit:
          description: Enumeration for weight units.
          enum:
          - KILOGRAM
          - POUND
          type: string
      required:
      - amount
      - unit
      type: object
