    AirlineFlightManifest:
      description: An airline flight manifest (FFM) is a notification of details of
        consignments loaded onto a flight or of details of the onward movement of
        a consignment loaded.
      properties:
        messageSequence:
          description: The message sequence provides compatibility with Cargo IMP.
            The first sequence number is '1'.
          format: int32
          type: integer
        hasContinuation:
          description: Indicated the presence of a related message. That message will
            contain the next higher sequence number.
          type: boolean
        flightIdAndPointOfLoading:
          $ref: "#/components/schemas/FlightIdAndPointOfLoading"
        pointOfUnloading:
          items:
            $ref: "#/components/schemas/PointOfUnloading"
          type: array
      required:
      - flightIdAndPointOfLoading
      - hasContinuation
      - messageSequence
      - pointOfUnloading
      type: object
