openapi: 3.0.1
info:
  contact:
    email: roland.scheel@scoop-software.de
    name: "Roland Scheel, SCOOP Software GmbH"
  description: CHAMP CMS API
  title: CHAMP CMS API
  version: "1.0"
tags:
- description: Track & Trace APIs
  name: Tracking
paths:
  /{user}/{waitMode}:
    post:
      description: "Accepts a Cargo Canonical Message and processes it according to\
        \ the requested waitMode. The polymorphic type is defined by the 'type' field\
        \ in the message payload. Valid types include 'air waybill', 'flight status',\
        \ 'house waybill', etc."
      operationId: receiveMessage
      parameters:
      - description: Password for authentication
        in: header
        name: password
        required: true
        schema:
          type: string
      - description: User identifier
        in: path
        name: user
        required: true
        schema:
          type: string
      - description: "Wait mode for processing (ANSWER, ACK, NO_WAIT)"
        in: path
        name: waitMode
        required: true
        schema:
          pattern: (ANSWER|ACK|NO_WAIT)
          type: string
      requestBody:
        content:
          '*/*':
            schema:
              $ref: "#/components/schemas/MessageObject"
        description: Polymorphic Cargo Canonical Message
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Message"
          description: Message successfully processed and acknowledged. Returns the
            response message if applicable.
        "400":
          description: Invalid request or malformed message.
        "401":
          description: Unauthorized.
      summary: Receive a Cargo Canonical Message
  /tracking/TTTFlight/{iataFlightNumber}:
    get:
      description: Fetch tracking information based on IATA flight number.
      operationId: TTTFlight
      parameters:
      - description: User identifier
        in: header
        name: user
        schema:
          type: string
      - description: Password
        in: header
        name: password
        schema:
          type: string
      - description: IATA Flight Number
        in: path
        name: iataFlightNumber
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Successfully retrieved flight track & trace information.
        "404":
          description: Flight not found.
      summary: Get flight tracking info
      tags:
      - Tracking
  /tracking/TTTFlightPlus/{awbNumber}:
    get:
      description: Fetch detailed flight tracking info including in-flight updates
        based on AWB number.
      operationId: TTTFlightPlus
      parameters:
      - description: User identifier
        in: header
        name: user
        schema:
          type: string
      - description: Password
        in: header
        name: password
        schema:
          type: string
      - description: Air Waybill Number
        in: path
        name: awbNumber
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Successfully retrieved detailed flight information.
        "404":
          description: Flight data for AWB not found.
      summary: Get detailed flight info for AWB
      tags:
      - Tracking
  /tracking/TTTHistory/{awbNumber}:
    get:
      description: Fetch full history of track & trace events for a given AWB.
      operationId: TTTHistory
      parameters:
      - description: User identifier
        in: header
        name: user
        schema:
          type: string
      - description: Password
        in: header
        name: password
        schema:
          type: string
      - description: Air Waybill Number
        in: path
        name: awbNumber
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Successfully retrieved tracking history.
        "404":
          description: History not found.
      summary: Get tracking history
      tags:
      - Tracking
  /tracking/TTTLight/{awbNumber}:
    get:
      description: Fetch basic track & trace information based on AWB number.
      operationId: TTTLight
      parameters:
      - description: User identifier
        in: header
        name: user
        schema:
          type: string
      - description: Password
        in: header
        name: password
        schema:
          type: string
      - description: Air Waybill Number
        in: path
        name: awbNumber
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Successfully retrieved light track & trace information.
        "404":
          description: AWB not found.
      summary: Get basic tracking info (Light)
      tags:
      - Tracking
  /tracking/TTTManifest/{flight}/{scheduledDate}:
    get:
      description: Fetch tracking info for a given flight and scheduled date.
      operationId: TTTManifest
      parameters:
      - description: User identifier
        in: header
        name: user
        schema:
          type: string
      - description: Password
        in: header
        name: password
        schema:
          type: string
      - description: Flight identifier
        in: path
        name: flight
        required: true
        schema:
          type: string
      - description: Scheduled date
        in: path
        name: scheduledDate
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Successfully retrieved manifest.
      summary: Get flight manifest tracking info
      tags:
      - Tracking
  /tracking/TTTExtended:
    post:
      description: Post an extended track & trace request for multiple AWBs to receive
        confirmations.
      operationId: TTTPlus
      parameters:
      - description: User identifier
        in: header
        name: user
        schema:
          type: string
      - description: Password
        in: header
        name: password
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TTTExtendedRequest"
        description: Extended Request containing multiple waybill identifications
        required: true
      responses:
        "200":
          description: Successfully processed extended request.
      summary: Get extended tracking confirmations
      tags:
      - Tracking
  /tracking/TTTPlus/{awbNumber}:
    get:
      description: Fetch extended track & trace information based on AWB number.
      operationId: TTTPlus_1
      parameters:
      - description: User identifier
        in: header
        name: user
        schema:
          type: string
      - description: Password
        in: header
        name: password
        schema:
          type: string
      - description: Air Waybill Number
        in: path
        name: awbNumber
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Successfully retrieved plus track & trace information.
        "404":
          description: AWB not found.
      summary: Get extended tracking info (Plus)
      tags:
      - Tracking
components:
  schemas:
    AccountContact:
      description: Contact data of an account (for example for a shipper or a consignee.
      properties:
        accountNumber:
          description: Account number (coded identification of a participant).
          example: ABC94269
          type: string
        address:
          $ref: "#/components/schemas/Address"
        contactDetails:
          description: Further contact details.
          items:
            $ref: "#/components/schemas/ContactDetail"
          type: array
      required:
      - address
      type: object
    Accounting:
      description: Accounting information
      properties:
        identifier:
          description: Accounting information identifier enumeration. Code indicating
            a specific kind of accounting information.
          enum:
          - CreditCardNumber
          - CreditCardExpiryDate
          - CreditCardIssuanceName
          - GeneralInformation
          - GovernmentBillOfLading
          - MiscellaneousChargeOrder
          - ModeOfSettlement
          - ReturnToOrigin
          - ShippersReferenceNumber
          example: GovernmentBillOfLading
          type: string
        accountingInformation:
          description: 'Detail of accounting information '
          example: Payment by certified cheque.
          type: string
      required:
      - accountingInformation
      - identifier
      type: object
    Address:
      description: Postal address of an individual or a company.
      properties:
        name1:
          description: First and mandatory name field.
          example: Donald Trump
          type: string
        name2:
          description: Optional second name field.
          example: President of the United States of America
          type: string
        streetAddress1:
          description: First and mandatory street field.
          example: The White House
          type: string
        streetAddress2:
          description: Optional second street field.
          example: 1600 Pennsylvania Avenue NW
          type: string
        place:
          description: Location or place of the address.
          example: "Washington, DC"
          type: string
        stateProvince:
          description: Part of a country.
          example: DC
          type: string
        country:
          description: ISO Country Code of the address.
          type: string
        postCode:
          description: Postal code of the address.
          example: "20500"
          type: string
      required:
      - country
      - name1
      - place
      - postCode
      - streetAddress1
      type: object
    Addressing:
      description: Addressing data of a Cargo Canonical Message.
      properties:
        routeVia:
          $ref: "#/components/schemas/ParticipantAddress"
        routeAnswerVia:
          $ref: "#/components/schemas/ParticipantAddress"
        senderAddresses:
          description: Array of addresses of the sender of the message.
          items:
            $ref: "#/components/schemas/ParticipantAddress"
          type: array
        finalRecipientAddresses:
          description: Array of addresses of the final recipients.
          items:
            $ref: "#/components/schemas/ParticipantAddress"
          type: array
        replyAnswerTo:
          description: Array of addresses that shall be used to deliver replies to
            the message.
          items:
            $ref: "#/components/schemas/ParticipantAddress"
          type: array
      required:
      - finalRecipientAddresses
      - senderAddresses
      type: object
    AgentIdentification:
      description: Identifies an agent.
      properties:
        name:
          description: Identification of individual or company.
          example: ACE SHIPPING CO.
          type: string
        place:
          description: Location of individual or company
          example: LONDON
          type: string
        accountNumber:
          description: Coded identification of a participant.
          example: ABC94269
          type: string
        iataCargoAgentNumericCode:
          description: IATA Cargo Agent Numeric Code (code issued by IATA to identify
            each IATA Cargo Agent whose name is entered on the Cargo Agency List).
          example: "1234567"
          type: string
        iataCargoAgentCASSAddress:
          description: IATA Cargo Agent CASS Address (code issued by IATA to identify
            individual agent locations for CASS billing purposes).
          example: "1234"
          type: string
        participantIdentifier:
          description: "Participant Identifier: Code identifying the type of participant\
            \ involved in the movement of a shipment."
          example: CNE
          type: string
      required:
      - iataCargoAgentNumericCode
      - name
      - place
      type: object
    AirWayBill:
      description: An air waybill (AWB) is a receipt issued by an international airline
        for goods and an evidence of the contract of carriage.
      properties:
        airWaybillNumber:
          description: Contains the air waybill number.
          type: string
        origin:
          description: Airport code of origin airport.
          type: string
        destination:
          description: Airport code of destination airport.
          type: string
        totalConsignmentNumberOfPieces:
          description: Total number of pieces of complete consignment.
          example: 20
          format: int32
          type: integer
        weight:
          $ref: "#/components/schemas/Weight"
        volume:
          $ref: "#/components/schemas/Volume"
        densityGroup:
          description: Enumeration indicating approximate density of goods.
          enum:
          - KG60_PER_CUBICMETRE
          - KG90_PER_CUBICMETRE
          - KG120_PER_CUBICMETRE
          - KG160_PER_CUBICMETRE
          - KG220_PER_CUBICMETRE
          - KG250_PER_CUBICMETRE
          - KG300_PER_CUBICMETRE
          - KG400_PER_CUBICMETRE
          - KG600_PER_CUBICMETRE
          - KG950_PER_CUBICMETRE
          type: string
        flights:
          description: Flight bookings.
          items:
            $ref: "#/components/schemas/Flight"
          type: array
        route:
          description: Routing.
          items:
            $ref: "#/components/schemas/Routing"
          type: array
        shipper:
