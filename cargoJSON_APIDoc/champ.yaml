            type: string
          notification:
            description: Notification.
            type: string
          customsActionCode:
            description: Customs action code.
            type: string
          customsEntryNumber:
            description: Customs entry number.
            type: string
          bondedPremisesIdentification:
            description: Coded identification of the warehouse where a bonded shipment
              will be stored.
            example: "96763"
            pattern: "(?:[0-9A-Z]{1,7})"
            type: string
          nameOfNominatedAgentOrConsignee:
            description: Identification of individual or company involved in the movement
              of a consignment.
            example: ACE SHIPPING CO
            type: string
          participantCodeOfNominatedAgentOrConsignee:
            $ref: "#/components/schemas/ParticipantCode"
          oci:
            description: "Other customs, security and regulatory information."
            items:
              $ref: "#/components/schemas/OCI"
            type: array
          airportOfReporting:
            description: The airport where the consignment was reported to customs.
            type: string
          flight:
            description: The flight the consignment is or was loaded on.
            type: string
          dateOfScheduledDeparture:
            description: The scheduled departure date of the flight.
            format: date
            type: string
          origin:
            description: The origin airport of the flight.
            type: string
          destination:
            description: The destination airport of the flight.
            type: string
        type: object
      description: |-
        This event reports that the consignment was reported to customs.
        Conforms to CIMP FSU status 'CRC'.
      required:
      - airportOfReporting
      - numberOfPieces
      - timeOfEvent
      - timeOfEventTimePartQuality
      type: object
